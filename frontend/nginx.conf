# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Smart Campus Assistant frontend
#
# Serves the Vite production build and proxies /ask → backend:8000.
# Proxying keeps the browser on one origin (port 80), eliminating CORS issues.
# ─────────────────────────────────────────────────────────────────────────────

# Run as a non-privileged worker (nginx:alpine image drops to `nginx` user).
worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /tmp/nginx.pid;           # writable by non-root user

events {
    worker_connections 1024;
}

http {
    # ── MIME types ──────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Upstream backend ────────────────────────────────────────────────────
    # "backend" resolves to the service name in docker-compose.yml.
    upstream backend_api {
        server backend:8000;
    }

    server {
        listen      80;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy       "strict-origin" always;

        # ── Proxy: /ask → FastAPI backend ───────────────────────────────────
        # The built frontend calls /ask (relative URL, no port, no CORS).
        # Exact prefix match - proxy to backend /ask/ (with trailing slash)
        location = /ask/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Match the client-side timeout guard (12 s) with a bit of headroom
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
        }

        # ── Proxy: /health → backend health check ───────────────────────────
        location /health {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Static assets: long-lived cache (Vite content-hashes filenames) ─
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        # ── SPA fallback: all other routes → index.html ─────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
