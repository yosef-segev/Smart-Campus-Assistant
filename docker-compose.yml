# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Smart Campus Assistant
#
# Services
#   backend   FastAPI + Uvicorn    → localhost:8000
#   frontend  Vite build + Nginx   → localhost:80   (proxies /ask → backend)
#
# Quick start
#   1. Copy .env.example to .env and fill in your OPENAI_API_KEY
#   2. docker compose up --build
#   3. Open http://localhost in your browser
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./server          # שינוי: הוספנו /server כדי שימצא את הקבצים שלך
      dockerfile: Dockerfile.backend
    container_name: campus-backend

    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.2}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-1024}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-10.0}

    ports:
      - "8000:8000"

    volumes:
      - campus_data:/app/data
      - campus_logs:/app/logs

    restart: unless-stopped

    # הערה: וודא שיש לך נתיב /health ב-main.py כדי שהצ'ק הזה יעבור
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

    networks:
      - campus-net


  # ── Frontend: Vite build → Nginx ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /ask/
    container_name: campus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - campus-net

volumes:
  campus_data:
  campus_logs:

networks:
  campus-net:
    driver: bridge
